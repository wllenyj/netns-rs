name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo check --all-features
    - name: RustFmt
      run: cargo fmt --all -- --check
    - name: Run tests
      run: cargo test --verbose
    - name: Clippy
      run: --all-features --all-targets -- -D warnings
      
